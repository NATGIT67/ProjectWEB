<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
</head>
<body class="login-page-body">

    <header class="navbar">
        <div class="container">
            <a href="index.html" class="logo">🌾 EasyRice</a>
            <button class="hamburger" id="hamburger" onclick="toggleMenu()">
                <span></span>
                <span></span>
                <span></span>
            </button>
            <nav id="navMenu">
            <ul>
                <li><a href="index.html">หน้าแรก</a></li>
                <li><a href="product.html">สินค้า</a></li>
                <li><a href="about.html">ข่าวสาร</a></li>
                <li><a href="contact.html">ติดต่อ</a></li>
            </ul>
        </nav>
            <a href="sign-in.html" class="btn-signin active">เข้าสู่ระบบ</a>
        </div>
    </header>

    <main class="login-main">
        <div class="login-card">
            <div class="login-header">
                <h2>สร้างบัญชี</h2>
                <p>เข้าร่วมเราเพื่อประสบการณ์เกษตรที่ดีขึ้น</p>
            </div>

            <form id="signUpForm">
                <div class="form-group">
                    <label for="fullname">ชื่อ-นามสกุล</label>
                    <input type="text" id="fullname" class="form-control" placeholder="กรอกชื่อ-นามสกุลของคุณ" required>
                </div>

                <div class="form-group">
                    <label for="email">ที่อยู่อีเมล</label>
                    <input type="email" id="email" class="form-control" placeholder="example@email.com" required>
                </div>

                <div class="form-group">
                    <label for="phone">เบอร์โทรศัพท์</label>
                    <input type="tel" id="phone" class="form-control" placeholder="08X-XXX-XXXX" required>
                </div>

                <div class="form-group">
                    <label for="password">รหัสผ่าน</label>
                    <input type="password" id="password" class="form-control" placeholder="สร้างรหัสผ่าน" required>
                </div>

                <div class="form-group">
                    <label for="confirm-password">ยืนยันรหัสผ่าน</label>
                    <input type="password" id="confirm-password" class="form-control" placeholder="ใส่รหัสผ่านอีกครั้ง" required>
                </div>

                <div class="form-options">
                    <div class="remember-me">
                        <input type="checkbox" id="terms" required>
                        <label for="terms" style="font-size: 0.85rem;">ฉันยอมรับ <a href="#" style="color:#2e7d32;">เงื่อนไขและข้อกำหนด</a></label>
                    </div>
                </div>

                <button type="submit" class="btn-primary full-width">สมัครสมาชิก</button>
            </form>
            
            <div class="sign-in-link" style="text-align:center; margin-top:15px;">
                <span>มีบัญชีอยู่แล้ว?</span>
                <a href="sign-in.html" style="color:#2e7d32; font-weight:500;"> เข้าสู่ระบบที่นี่</a>
            </div>

            <div class="divider"><span>หรือ</span></div>

            <div class="social-login">
                <button class="social-btn"><i class="fab fa-google"></i> Google</button>
                <button class="social-btn"><i class="fab fa-line"></i> LINE</button>
            </div>
        </div>
    </main>

    <script>
document.getElementById('signUpForm').addEventListener('submit', function(e) {
    e.preventDefault();

    const fullname = document.getElementById('fullname').value.trim();
    const email = document.getElementById('email').value.trim();
    const phone = document.getElementById('phone').value.trim();
    const password = document.getElementById('password').value;
    const confirmPassword = document.getElementById('confirm-password').value;
    const terms = document.getElementById('terms').checked;

    // Validation
    if (!fullname || !email || !phone || !password || !confirmPassword) {
        showMessage('กรุณากรอกข้อมูลให้ครบถ้วน', false);
        return;
    }

    if (password !== confirmPassword) {
        showMessage('รหัสผ่านไม่ตรงกัน กรุณาตรวจสอบอีกครั้ง', false);
        return;
    }

    if (password.length < 6) {
        showMessage('รหัสผ่านต้องมีอย่างน้อย 6 ตัวอักษร', false);
        return;
    }

    if (!terms) {
        showMessage('กรุณายอมรับเงื่อนไขและข้อกำหนด', false);
        return;
    }

    // Check if email already exists
    const existingUsers = JSON.parse(localStorage.getItem('easyrice_users')) || [];
    const emailExists = existingUsers.some(user => user.email === email);

    if (emailExists) {
        showMessage('อีเมลนี้ถูกใช้งานแล้ว กรุณาใช้อีเมลอื่น', false);
        return;
    }

    // Create new user
    const newUser = {
        id: Date.now(),
        name: fullname,
        email: email,
        phone: phone,
        password: password, // In real app, this should be hashed
        createdAt: new Date().toISOString()
    };

    existingUsers.push(newUser);
    localStorage.setItem('easyrice_users', JSON.stringify(existingUsers));

    showMessage('สมัครสมาชิกสำเร็จ! กำลังนำทางไปหน้าเข้าสู่ระบบ...', true);
    setTimeout(() => {
        window.location.href = 'sign-in.html';
    }, 1500);
});

function showMessage(message, success) {
    let msgDiv = document.getElementById('signup-message');
    if (!msgDiv) {
        msgDiv = document.createElement('div');
        msgDiv.id = 'signup-message';
        document.getElementById('signUpForm').prepend(msgDiv);
    }

    msgDiv.style.display = 'block';
    msgDiv.innerHTML = message;
    msgDiv.style.background = success ? '#e8f5e9' : '#ffebee';
    msgDiv.style.color = success ? '#2e7d32' : '#c62828';
    msgDiv.style.border = success ? '1px solid #81c784' : '1px solid #e57373';
    msgDiv.style.padding = '10px 15px';
    msgDiv.style.borderRadius = '6px';
    msgDiv.style.marginBottom = '15px';
    msgDiv.style.textAlign = 'center';
}

// Mobile menu toggle
function toggleMenu() {
    const hamburger = document.getElementById('hamburger');
    const navMenu = document.getElementById('navMenu');
    hamburger.classList.toggle('active');
    navMenu.classList.toggle('active');
}

// Close menu when link clicked
document.querySelectorAll('#navMenu a').forEach(link => {
    link.addEventListener('click', () => {
        document.getElementById('hamburger').classList.remove('active');
        document.getElementById('navMenu').classList.remove('active');
    });
});
</script>
<script src="../js/easyrice.js"></script>
</body>
</html>
